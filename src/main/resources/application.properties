# ============================================================
# Smart Hostel Leave Management Portal - AKGEC Ghaziabad
# ============================================================

# Server
server.port=8080
server.servlet.context-path=/api

# ============================================================
# DATABASE (PostgreSQL)
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver




# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT
# ============================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ============================================================
# EMAIL (Gmail SMTP) - Update with real credentials
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=AKGEC Hostel Leave Portal <hostelleave@akgec.ac.in>

# ============================================================
# FILE STORAGE
# ============================================================
app.file.upload-dir=./uploads
app.file.pdf-dir=./uploads/leavepass
app.file.max-size=5MB
spring.web.resources.static-locations=file:./uploads/
spring.mvc.static-path-pattern=/uploads/**



# ============================================================
# APPLICATION URLs
# ============================================================
app.base-url=${BASE_URL:http://localhost:8080/api}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Parent approval token expiry (hours)
app.parent-token.expiry-hours=48

# ============================================================
# MULTIPART FILE UPLOAD
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# LOGGING
# ============================================================
logging.level.com.akgec.hostel=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# =====================================================


default.admin.name=${ADMIN_NAME}
default.admin.email=${ADMIN_EMAIL}
default.admin.password=${ADMIN_PASSWORD}

default.warden.name=${WARDEN_NAME}
default.warden.email=${WARDEN_EMAIL}
default.warden.password=${WARDEN_PASSWORD}

default.dean.name=${DEAN_NAME}
default.dean.email=${DEAN_EMAIL}
default.dean.password=${DEAN_PASSWORD}

default.security.name=${SECURITY_NAME}
default.security.email=${SECURITY_EMAIL}
default.security.password=${SECURITY_PASSWORD}

